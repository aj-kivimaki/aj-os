# Nine dependencies were drifting with no monitoring and no security alerts
# (REX F-036).
#
# Monthly and grouped, deliberately: the finding is "unmonitored", not "not
# updated often enough". Weekly PRs on a single-maintainer repository become
# noise, and noise gets ignored — which is the state this is meant to fix.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      # One PR per ecosystem concern rather than one per package.
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
