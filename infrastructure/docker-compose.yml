services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: aj-os-n8n

    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      - TZ=Europe/Helsinki
      # Public HTTPS base URL of your tunnel to n8n (needed for Telegram/Slack/
      # WhatsApp triggers to register their webhooks). Set in infrastructure/.env.
      - WEBHOOK_URL=${WEBHOOK_URL:-}

    volumes:
      - ./n8n/data:/home/node/.n8n
